name: CI — Sales Insight Automator

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: Lint ────────────────────────────────────────────────────────
  lint-backend:
    name: "🐍 Backend — Lint (flake8)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Run flake8
        run: flake8 main.py --max-line-length=120 --ignore=E501,W503

  # ── Backend: Docker Build ────────────────────────────────────────────────
  build-backend:
    name: "🐳 Backend — Docker Build"
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: sales-insight-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend: Lint ───────────────────────────────────────────────────────
  lint-frontend:
    name: "⚛️  Frontend — Lint (ESLint)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

  # ── Frontend: Build ──────────────────────────────────────────────────────
  build-frontend:
    name: "🏗️  Frontend — Next.js Build"
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

  # ── Frontend: Docker Build ────────────────────────────────────────────────
  build-frontend-docker:
    name: "🐳 Frontend — Docker Build"
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: sales-insight-frontend:ci-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Compose Validate ───────────────────────────────────────────────────────
  validate-compose:
    name: "🔧 docker-compose validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  # ── Summary ────────────────────────────────────────────────────────────────
  ci-success:
    name: "✅ CI Passed"
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend-docker
      - validate-compose
    steps:
      - name: All checks passed
        run: echo "🎉 All CI checks passed for commit ${{ github.sha }}"
